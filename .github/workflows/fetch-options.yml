name: Fetch NSE Options Data

on:
  schedule:
    # Run every 5 minutes during market hours (03:45 UTC to 10:00 UTC = 09:15 IST to 15:30 IST)
    # Note: GitHub Actions cron scheduling is approximate and may be delayed
    # Monday to Friday
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install @supabase/supabase-js

      - name: Fetch and Cache Options
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/fetch_nse_options.js
